spring:
  application:
    name: speakfit-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  jackson:
    time-zone: Asia/Seoul
    json:
      read:
        allow-unescaped-control-chars: true

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

logging:
  level:
    root: info

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ap-northeast-2
    s3:
      bucket: ${AWS_S3_BUCKET}
    stack:
      auto: false

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://speak-fit-fe.vercel.app}
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:https://*.vercel.app}
  cookie:
    secure: false
  ai:
    base-url: ${AI_BASE_URL:http://localhost:5000}
    response-timeout-seconds: ${AI_RESPONSE_TIMEOUT_SECONDS:900}
    auto-start: ${AI_AUTO_START:true}
  websocket:
    base-url: ${WS_BASE_URL:ws://localhost:5000/ws/practice/}

jwt:
  secret: ${JWT_SECRET}
  access-token-exp-seconds: ${JWT_ACCESS_EXP_SECONDS:3600}
  refresh-token-exp-seconds: ${JWT_REFRESH_EXP_SECONDS:86400}
