spring:
  application:
    name: speakfit-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  jackson:
    time-zone: Asia/Seoul
    json:
      read:
        allow-unescaped-control-chars: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

logging:
  level:
    root: info

app:
  cookie:
    secure: false
  ai:
    base-url: ${AI_BASE_URL:http://localhost:5000}
    response-timeout-seconds: ${AI_RESPONSE_TIMEOUT_SECONDS:900}
    auto-start: ${AI_AUTO_START:true}
  websocket:
    base-url: ${WS_BASE_URL:ws://localhost:5000/ws/practice/}

jwt:
  secret: ${JWT_SECRET}
  access-token-exp-seconds: ${JWT_ACCESS_EXP_SECONDS:3600}
  refresh-token-exp-seconds: ${JWT_REFRESH_EXP_SECONDS:86400}
